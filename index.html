<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skiply — Skip the boring parts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    #chat-container {
      width: 100%;
      max-width: 680px;
      background: #1a1a1a;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      height: 85vh;
      overflow: hidden;
    }
    #chat-header {
      background: #111;
      padding: 18px 24px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #chat-header .logo { font-size: 22px; font-weight: 800; color: #7c3aed; letter-spacing: -0.5px; }
    #chat-header .tagline { font-size: 12px; color: #666; margin-top: 2px; }
    #chat-header .dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; margin-left: auto; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg { display: flex; flex-direction: column; max-width: 80%; }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; }
    .bubble { padding: 12px 16px; border-radius: 14px; font-size: 15px; line-height: 1.55; white-space: pre-wrap; }
    .msg.bot .bubble { background: #252525; border-bottom-left-radius: 4px; color: #f0f0f0; }
    .msg.user .bubble { background: #7c3aed; border-bottom-right-radius: 4px; color: #fff; }
    .typing-indicator { display: flex; gap: 5px; padding: 14px 16px; background: #252525; border-radius: 14px; border-bottom-left-radius: 4px; width: fit-content; }
    .typing-indicator span { width: 8px; height: 8px; background: #666; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-7px); } }
    #input-area { display: flex; padding: 16px; border-top: 1px solid #2a2a2a; gap: 10px; background: #111; }
    #user-input {
      flex: 1;
      background: #252525;
      border: 1px solid #333;
      color: #f0f0f0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 48px;
      max-height: 120px;
    }
    #user-input:focus { border-color: #7c3aed; }
    #send-btn {
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0 22px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: #6d28d9; }
    #send-btn:disabled { background: #3a3a3a; cursor: not-allowed; }
    .powered-by { font-size: 11px; color: #333; text-align: center; padding: 8px; background: #111; }
  </style>
</head>
<body>
<div id="chat-container">
  <div id="chat-header">
    <div>
      <div class="logo">Skiply</div>
      <div class="tagline">Skip the boring parts.</div>
    </div>
    <div class="dot"></div>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="user-input" placeholder="Type your message..." rows="1"></textarea>
    <button id="send-btn">&#10148;</button>
  </div>
  <div class="powered-by">Powered by Claude AI</div>
</div>

<script>
  // Make.com webhook URL — this is the ONLY thing you need to configure
  const MAKE_WEBHOOK_URL = 'YOUR_MAKE_WEBHOOK_URL_HERE';

  // Conversation history (stored in browser memory only)
  let history = [];

  const msgsEl = document.getElementById('messages');
  const inp = document.getElementById('user-input');
  const btn = document.getElementById('send-btn');

  function addMsg(role, text) {
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    const b = document.createElement('div');
    b.className = 'bubble';
    b.innerText = text;
    d.appendChild(b);
    msgsEl.appendChild(d);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function showTyping() {
    const d = document.createElement('div');
    d.className = 'msg bot';
    d.id = 'typing';
    d.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    msgsEl.appendChild(d);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function send(userText) {
    if (!userText.trim()) return;

    history.push({ role: 'user', content: userText });
    addMsg('user', userText);
    inp.value = '';
    inp.style.height = 'auto';
    btn.disabled = true;
    showTyping();

    try {
      const response = await fetch(MAKE_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await response.json();
      removeTyping();

      const reply = data.reply || data.message || data.text || 'Sorry, I could not get a response.';
      history.push({ role: 'assistant', content: reply });
      addMsg('bot', reply);

    } catch (e) {
      removeTyping();
      addMsg('bot', 'Connection error. Please try again in a moment.');
      console.error('Error:', e);
      // Remove failed user message from history
      history.pop();
    }

    btn.disabled = false;
    inp.focus();
  }

  // Auto-resize textarea
  inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
  });

  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send(inp.value);
    }
  });

  btn.addEventListener('click', () => send(inp.value));

  // Start conversation automatically
  async function start() {
    showTyping();
    try {
      const response = await fetch(MAKE_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [{ role: 'user', content: '__START__' }] })
      });
      const data = await response.json();
      removeTyping();
      const reply = data.reply || data.message || data.text;
      if (reply) {
        history.push({ role: 'assistant', content: reply });
        addMsg('bot', reply);
      }
    } catch(e) {
      removeTyping();
      addMsg('bot', "Hi! I'm Skiply's assistant. I help people discover how much time they could save by automating repetitive work.\n\nCould you start by telling me your name and what you do?");
      console.error(e);
    }
  }

  start();
</script>
</body>
</html>
