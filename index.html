<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skiply — Skip the boring parts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    #chat-container {
      width: 100%;
      max-width: 680px;
      background: #1a1a1a;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      height: 85vh;
      overflow: hidden;
    }
    #chat-header {
      background: #111;
      padding: 18px 24px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #chat-header .logo { font-size: 22px; font-weight: 800; color: #7c3aed; }
    #chat-header .tagline { font-size: 12px; color: #666; }
    #chat-header .dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; margin-left: auto; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { display: flex; flex-direction: column; max-width: 80%; }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; }
    .bubble { padding: 12px 16px; border-radius: 14px; font-size: 15px; line-height: 1.5; }
    .msg.bot .bubble { background: #252525; border-bottom-left-radius: 4px; color: #f0f0f0; }
    .msg.user .bubble { background: #7c3aed; border-bottom-right-radius: 4px; color: #fff; }
    .typing-indicator { display: flex; gap: 4px; padding: 12px 16px; background: #252525; border-radius: 14px; border-bottom-left-radius: 4px; width: fit-content; }
    .typing-indicator span { width: 8px; height: 8px; background: #666; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    #input-area { display: flex; padding: 16px; border-top: 1px solid #2a2a2a; gap: 10px; background: #111; }
    #user-input { flex: 1; background: #252525; border: 1px solid #333; color: #f0f0f0; border-radius: 10px; padding: 12px 16px; font-size: 15px; outline: none; resize: none; }
    #user-input:focus { border-color: #7c3aed; }
    #send-btn { background: #7c3aed; color: white; border: none; border-radius: 10px; padding: 0 20px; font-size: 18px; cursor: pointer; }
    #send-btn:hover { background: #6d28d9; }
    #send-btn:disabled { background: #444; cursor: not-allowed; }
    .powered-by { font-size: 11px; color: #444; text-align: center; padding: 8px; }
  </style>
</head>
<body>
<div id="chat-container">
  <div id="chat-header">
    <div><div class="logo">Skiply</div><div class="tagline">Skip the boring parts.</div></div>
    <div class="dot"></div>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="user-input" placeholder="Type your message..."></textarea>
    <button id="send-btn">&#10148;</button>
  </div>
  <div class="powered-by">Powered by Claude AI</div>
</div>
<script>
  const CLAUDE_API_KEY = 'YOUR_CLAUDE_API_KEY_HERE';
  const MAKE_WEBHOOK_URL = 'YOUR_MAKE_WEBHOOK_URL_HERE';
  const systemPrompt = `You are Skiply's friendly conversational assistant. Skiply is an automation service that helps businesses eliminate repetitive manual work. Use SPIN selling and the Socratic method.

FLOW:
1. Introduce yourself, ask for name and role.
2. Ask about their typical workday (Monday morning question).
3. Ask 3-4 follow-ups to uncover repetitive tasks. Reflect back in their words.
4. Based on awareness level: educate, spark curiosity, or validate.
5. Collect: name, email, company, role, pain_point.
6. Close: hot=book consultation, warm=offer audit report, cold=plant a seed.
7. When you have all lead data, append this EXACT block at end of message:
LEAD_DATA:{"name":"...","email":"...","company":"...","role":"...","pain_point":"...","lead_temp":"hot|warm|cold","meeting_agreed":"yes|no","followup_type":"consultation|report|seed"}

RULES: Auto-detect Czech/English. One question at a time. Warm, never salesy. Max 3 sentences per reply.`;

  let history = [];
  let webhookSent = false;

  const msgs = document.getElementById('messages');
  const inp = document.getElementById('user-input');
  const btn = document.getElementById('send-btn');

  function addMsg(role, text) {
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    const b = document.createElement('div');
    b.className = 'bubble';
    b.innerText = text;
    d.appendChild(b);
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const d = document.createElement('div');
    d.className = 'msg bot'; d.id = 'typing';
    d.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

  function handleLead(text) {
    if (webhookSent) return text;
    const m = text.match(/LEAD_DATA:({[sS]*?})/);
    if (m) {
      try {
        const data = JSON.parse(m[1]);
        fetch(MAKE_WEBHOOK_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) })
          .then(() => { webhookSent = true; })
          .catch(e => console.error('Webhook error:', e));
        return text.replace(/LEAD_DATA:{[sS]*?}/, '').trim();
      } catch(e) { console.error(e); }
    }
    return text;
  }

  async function callClaude(msgs_arr) {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': CLAUDE_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model: 'claude-3-5-haiku-20241022', max_tokens: 1024, system: systemPrompt, messages: msgs_arr })
    });
    return await r.json();
  }

  async function send(text) {
    if (!text.trim()) return;
    history.push({ role:'user', content: text });
    addMsg('user', text);
    inp.value = ''; btn.disabled = true;
    showTyping();
    try {
      const data = await callClaude(history);
      removeTyping();
      if (data.content && data.content[0]) {
        let t = handleLead(data.content[0].text);
        history.push({ role:'assistant', content: t });
        addMsg('bot', t);
      } else { addMsg('bot', 'Something went wrong. Please try again.'); }
    } catch(e) { removeTyping(); addMsg('bot', 'Connection error. Please try again.'); console.error(e); }
    btn.disabled = false; inp.focus();
  }

  async function start() {
    showTyping();
    try {
      const data = await callClaude([{ role:'user', content:'Hello' }]);
      removeTyping();
      if (data.content && data.content[0]) {
        const t = data.content[0].text;
        history.push({ role:'assistant', content: t });
        addMsg('bot', t);
      }
    } catch(e) {
      removeTyping();
      addMsg('bot', "Hi! I'm Skiply's assistant — here to help you discover how much time you could save by automating repetitive work. What's your name and what do you do?");
    }
  }

  btn.addEventListener('click', () => send(inp.value));
  inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(inp.value); } });
  start();
</script>
</body>
</html>
